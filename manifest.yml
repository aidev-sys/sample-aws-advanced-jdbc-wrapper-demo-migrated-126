---
applications:
- name: sample-aws-advanced-jdbc-wrapper-demo-modernized
  memory: 1G
  instances: 1
  buildpacks:
    - java_buildpack
  path: build/libs/*.jar
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    SPRING_PROFILES_ACTIVE: cloud
  services:
    - modernized-postgres

- name: sample-aws-advanced-jdbc-wrapper-demo-modernized-config_templates-aws-jdbc-wrapper
  memory: 1G
  instances: 1
  buildpacks:
    - java_buildpack
  path: config_templates/aws-jdbc-wrapper/build/libs/*.jar
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    SPRING_PROFILES_ACTIVE: cloud
  services:
    - modernized-postgres

